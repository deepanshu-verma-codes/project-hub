worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    
    sendfile        on;
    keepalive_timeout  65;

    # Upstream Node.js backend cluster
    upstream node_backend {
        server 127.0.0.1:5001;
        # server 127.0.0.1:5001; # Uncomment for load balancing across instances
    }

    server {
        listen 80;
        server_name pmsystem.internal;

        # Serve Frontend Static Files
        location / {
            root /var/www/frontend;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # Proxy API requests to Node backend
        location /api/ {
            proxy_pass http://node_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Dedicated location for Socket.IO WebSockets
        location /socket.io/ {
            proxy_pass http://node_backend;
            proxy_http_version 1.1;
            
            # Explicit Configuration Updates for WebSockets required by FRD
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # Prolong timeout for persistent WebSocket connections
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
        }
    }
}
